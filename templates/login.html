{% extends "base.html" %}

{% block title %}Login | Smart Lender{% endblock %}

{% block content %}
<div class="split-layout">
    <div class="split-left">
        <div class="split-left-content">
            <h2>Welcome Back to Smart Lender</h2>
            <p>Access your dashboard to predict loan eligibility instantly.</p>
            <div class="floating-shapes">
                <div class="shape shape-1"></div>
                <div class="shape shape-2"></div>
                <div class="shape shape-3"></div>
            </div>
        </div>
    </div>
    
    <div class="split-right">
        <div class="auth-card no-shadow">
            <h2>Sign In</h2>
            <p class="auth-subtitle">Please enter your details to continue.</p>
            
            <form method="POST" action="{{ url_for('login') }}" class="auth-form">
                <div class="input-group icon-input">
                    <i class="ph ph-envelope-simple"></i>
                    <input type="email" id="email" name="email" placeholder="Email Address" required>
                </div>
                
                <div class="input-group icon-input password-input">
                    <i class="ph ph-lock-key"></i>
                    <input type="password" id="password" name="password" placeholder="Password" required>
                    <i class="ph ph-eye toggle-password" onclick="togglePassword('password', this)"></i>
                </div>
                
                <button type="submit" class="btn-primary">
                    Login
                </button>
            </form>
            
            <div class="auth-footer">
                Don't have an account? <a href="{{ url_for('register') }}">Create one now</a>
            </div>
        </div>
    </div>
</div>

<script>
function togglePassword(inputId, icon) {
    const input = document.getElementById(inputId);
    if (input.type === "password") {
        input.type = "text";
        icon.classList.remove("ph-eye");
        icon.classList.add("ph-eye-slash");
    } else {
        input.type = "password";
        icon.classList.remove("ph-eye-slash");
        icon.classList.add("ph-eye");
    }
}
</script>
{% endblock %}
