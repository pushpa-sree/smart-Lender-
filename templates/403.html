{% extends "base.html" %}

{% block title %}403 - Access Denied | Smart Lender{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card" style="text-align: center;">
        <i class="ph-fill ph-lock-key" style="font-size: 4rem; color: var(--red); margin-bottom: 20px;"></i>
        <h2 style="color: var(--red); margin-bottom: 10px;">403 - Access Denied</h2>
        <p style="color: var(--text-muted); margin-bottom: 30px;">You are not authorized to access this page.</p>
        
        <a href="{{ url_for('login') }}" class="btn-primary" style="text-decoration: none;">
            <i class="ph ph-sign-in"></i> Return to Login
        </a>
    </div>
</div>
{% endblock %}
