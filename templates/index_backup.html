<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Lender</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">

        <div class="card">

            <h1>🏦 Smart Lender</h1>

            <p class="subtitle">
                Loan Eligibility Prediction System using Machine Learning & Flask
            </p>

            <form action="/predict" method="POST">

                <label>Gender</label>
                <select name="gender">
                    <option value="1">Male</option>
                    <option value="0">Female</option>
                </select>

                <label>Married</label>
                <select name="married">
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>

                <label>Dependents</label>
                <input type="number" name="dependents" min="0" max="5" required>

                <label>Education</label>
                <select name="education">
                    <option value="1">Graduate</option>
                    <option value="0">Not Graduate</option>
                </select>

                <label>Self Employed</label>
                <select name="self_employed">
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>

                <label>Applicant Income</label>
                <input type="number" name="applicant_income" required>

                <label>Coapplicant Income</label>
                <input type="number" name="coapplicant_income" required>

                <label>Loan Amount</label>
                <input type="number" name="loan_amount" required>

                <label>Loan Term</label>
                <input type="number" name="loan_term" required>

                <label>Credit History</label>
                <select name="credit_history">
                    <option value="1">Good</option>
                    <option value="0">Bad</option>
                </select>

                <label>Property Area</label>
                <select name="property_area">
                    <option value="2">Urban</option>
                    <option value="1">Semiurban</option>
                    <option value="0">Rural</option>
                </select>

                <button type="submit">
                    Predict Loan Eligibility
                </button>

            </form>

            {% if prediction_text %}
            <div class="result">
                <h2>{{ prediction_text }}</h2>
            </div>
            {% endif %}

        </div>

    </div>

    <footer>
        Powered by Machine Learning & Flask
    </footer>

</body>

</html>
