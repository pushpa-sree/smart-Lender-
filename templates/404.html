{% extends "base.html" %}

{% block title %}404 - Page Not Found | Smart Lender{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card" style="text-align: center;">
        <i class="ph-fill ph-warning-circle" style="font-size: 4rem; color: var(--orange); margin-bottom: 20px;"></i>
        <h2 style="color: var(--orange); margin-bottom: 10px;">404 - Page Not Found</h2>
        <p style="color: var(--text-muted); margin-bottom: 30px;">The page you are looking for does not exist or has been moved.</p>
        
        <a href="{{ url_for('home') }}" class="btn-primary" style="text-decoration: none;">
            <i class="ph ph-house"></i> Return to Home
        </a>
    </div>
</div>
{% endblock %}
