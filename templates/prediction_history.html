<!DOCTYPE html>
<html>
<head>
    <title>My Prediction History</title>
</head>
<body>

<h1>My Prediction History</h1>

<table border="1">

<tr>
    <th>Date</th>
    <th>Gender</th>
    <th>Income</th>
    <th>Loan Amount</th>
    <th>Prediction</th>
</tr>

{% for prediction in predictions %}

<tr>

    <td>{{ prediction.prediction_date }}</td>

    <td>{{ prediction.gender }}</td>

    <td>{{ prediction.applicant_income }}</td>

    <td>{{ prediction.loan_amount }}</td>

    <td>{{ prediction.prediction }}</td>

</tr>

{% endfor %}

</table>

<br>

<a href="{{ url_for('officer_dashboard') }}">
    <button>Back</button>
</a>

</body>
</html>
